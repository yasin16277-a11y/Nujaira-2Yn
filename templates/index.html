<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nujaira-2 AI Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; background:#fff; border-radius: 10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
        #chat-box { height: 400px; overflow-y: auto; border:1px solid #ddd; padding:10px; border-radius:5px; background:#fafafa; margin-bottom:10px;}
        .user-msg { text-align: right; color: #000; margin: 5px 0;}
        .ai-msg { text-align: left; color: #007BFF; margin: 5px 0;}
        select, input, button { padding:10px; margin:5px 0; border-radius:5px; border:1px solid #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Nujaira-2 AI Assistant</h2>

        <!-- Mood / Persona Selection -->
        <label for="mood">Select Mood / Persona:</label>
        <select id="mood">
            <option value="default">Default</option>
            <option value="lucifer">Lucifer</option>
            <option value="lilith">Lilith</option>
            <option value="kamukta">Kamukta</option>
            <option value="fantasy">Fantasy</option>
            <option value="roleplay">Roleplay</option>
            <option value="mom">Mom</option>
        </select>

        <!-- Chat Box -->
        <div id="chat-box"></div>

        <!-- User Input -->
        <input type="text" id="user-input" placeholder="Type your message here..." />
        <button id="send-btn">Send</button>
        <button id="voice-btn">🎤 Voice Input (Placeholder)</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const moodSelect = document.getElementById('mood');
        const voiceBtn = document.getElementById('voice-btn');

        function appendMessage(message, sender='ai') {
            const msgDiv = document.createElement('div');
            msgDiv.className = sender === 'ai' ? 'ai-msg' : 'user-msg';
            msgDiv.innerText = message;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            const mood = moodSelect.value;
            if(!text) return;

            appendMessage(text, 'user');
            userInput.value = '';

            try {
                const response = await fetch('/api/chat', {
                    method:'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({message:text, mood:mood})
                });
                const data = await response.json();
                appendMessage(data.response, 'ai');
            } catch (err) {
                appendMessage("Error: Unable to get response", 'ai');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        voiceBtn.addEventListener('click', () => {
            appendMessage("[Voice Input Placeholder activated]", 'user');
            appendMessage("[AI will process voice input here]", 'ai');
        });
    </script>
</body>
</html>
