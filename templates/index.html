<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nujaira-2 AI Assistant</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Nujaira-2 AI Assistant</h1>

        <!-- Persona selection -->
        <label for="mood-select">Select Persona:</label>
        <select id="mood-select">
            <option value="default">Default</option>
            <option value="lucifer">Lucifer</option>
            <option value="lilith">Lilith</option>
            <option value="kamukta">Kamukta</option>
            <option value="fantasy">Fantasy</option>
            <option value="roleplay">Roleplay</option>
            <option value="mom">Mom</option>
        </select>

        <!-- Chat messages -->
        <div id="chat-window"></div>

        <!-- User input -->
        <input type="text" id="user-input" placeholder="Type your command here...">
        <button id="send-btn">Send</button>
        <button id="voice-btn">🎤 Voice</button>

        <!-- Screen streaming -->
        <h3>Screen Stream:</h3>
        <canvas id="screen-canvas" width="640" height="360"></canvas>
    </div>

    <script>
        // ==============================
        // Chat Functionality
        // ==============================
        function addMessage(sender, text) {
            $("#chat-window").append(`<p><strong>${sender}:</strong> ${text}</p>`);
            $("#chat-window").scrollTop($("#chat-window")[0].scrollHeight);
        }

        $("#send-btn").click(async function() {
            let userInput = $("#user-input").val();
            if (!userInput) return;
            let mood = $("#mood-select").val();
            addMessage("You", userInput);
            $("#user-input").val("");

            // Send to API
            let response = await fetch("/api/chat", {
                method: "POST",
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({command: userInput, mood: mood})
            });
            let data = await response.json();
            addMessage("Nujaira-2", data.response);
        });

        // ==============================
        // Voice Input Functionality
        // ==============================
        let recognition;
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = function(event) {
                let voiceText = event.results[0][0].transcript;
                $("#user-input").val(voiceText);
                $("#send-btn").click();
            }
        }

        $("#voice-btn").click(function() {
            if(recognition) recognition.start();
        });

        // ==============================
        // Screen Stream Placeholder
        // ==============================
        const canvas = document.getElementById('screen-canvas');
        const ctx = canvas.getContext('2d');

        async function fetchScreen() {
            try {
                const response = await fetch('/api/screen');
                const blob = await response.blob();
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                img.src = URL.createObjectURL(blob);
            } catch (e) {
                console.log("Screen fetch error:", e);
            }
        }

        setInterval(fetchScreen, 1000 / 15); // 15 FPS
    </script>
</body>
</html>
