<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nujaira AI Console</title>
<style>
body {font-family: Arial,sans-serif; background:#f2f2f2; margin:0;}
#chat-container {max-width:600px; margin:auto; padding:20px; background:white; height:90vh; overflow-y:auto; border-radius:8px;}
#messages {list-style:none; padding:0;}
#messages li {margin:10px 0;}
.user-msg {text-align:right; color:blue;}
.ai-msg {text-align:left; color:green;}
#input-container {display:flex; margin-top:10px;}
#user-input {flex:1; padding:10px; font-size:16px;}
#send-btn {padding:10px 20px; font-size:16px; background:#4CAF50; color:white; border:none; cursor:pointer;}
#send-btn:hover {background:#45a049;}
#mood-select {margin-left:10px; padding:10px;}
</style>
</head>
<body>
<div id="chat-container">
    <ul id="messages"></ul>
    <div id="input-container">
        <input type="text" id="user-input" placeholder="Type your message..." />
        <select id="mood-select">
            <option value="Lucifer">Lucifer</option>
            <option value="Lilith">Lilith</option>
            <option value="Nujaira">Nujaira</option>
        </select>
        <button id="send-btn">Send</button>
    </div>
</div>
<script>
const messages = document.getElementById("messages");
const userInput = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const moodSelect = document.getElementById("mood-select");

let userId = localStorage.getItem("nujaira_user_id") || "";

function appendMessage(text, cls){
    const li=document.createElement("li");
    li.textContent=text;
    li.className=cls;
    messages.appendChild(li);
    messages.scrollTop=messages.scrollHeight;
}

async function sendMessage(){
    const text=userInput.value.trim();
    const mood=moodSelect.value;
    if(!text) return;
    appendMessage("You: "+text,"user-msg");
    userInput.value="";
    const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text,mood:mood,user_id:userId})});
    const data=await res.json();
    appendMessage("AI: "+data.response,"ai-msg");
    if(data.user_id){
        userId=data.user_id;
        localStorage.setItem("nujaira_user_id",userId);
    }
}

sendBtn.addEventListener("click",sendMessage);
userInput.addEventListener("keypress",e=>{if(e.key==="Enter") sendMessage();});
</script>
</body>
</html>
